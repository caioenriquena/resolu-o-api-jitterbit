version: "3.9"

services:
  db:
    image: postgres:16
    container_name: orders_postgres
    restart: always
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_orders:/var/lib/postgresql/data

volumes:
  pgdata_orders:

